<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Agora Müze Gezisi</title>
    <!-- A-Frame Kütüphanesi -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- Physics ve Extras (Çarpışma ve Gelişmiş Kontroller için) -->
    <script
        src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #87CEEB;
        }

        /* A-Frame'in VR butonunu tamamen gizle */
        .a-enter-vr,
        .a-enter-vr-button,
        [class*="a-enter-vr"] {
            display: none !important;
        }

        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 20, 0.85);
            color: #fff;
            padding: 20px 30px;
            border-radius: 16px;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            pointer-events: none;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ffda75;
            text-transform: uppercase;
        }

        .instruction {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 4px 0;
            font-size: 14px;
        }

        .key {
            background: #fff;
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
        }

        .highlight {
            color: #81d4fa;
            font-weight: bold;
            margin-top: 5px;
        }

        /* MOBİL KONTROLLER (D-PAD) */
        #mobile-controls {
            position: fixed;
            bottom: 40px;
            left: 40px;
            width: 150px;
            height: 150px;
            display: none;
            z-index: 1000;
            user-select: none;
            -webkit-user-select: none;
        }

        .dpad-btn {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(128, 128, 128, 0.5);
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            touch-action: manipulation;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.4);
        }

        .dpad-btn:active {
            background: rgba(200, 200, 200, 0.8);
            box-shadow: none;
            transform: translateY(2px);
        }

        #btn-up {
            top: 0;
            left: 50px;
        }

        #btn-left {
            top: 50px;
            left: 0;
        }

        #btn-center {
            top: 50px;
            left: 50px;
            border-radius: 4px;
            background: rgba(128, 128, 128, 0.3);
        }

        #btn-right {
            top: 50px;
            left: 100px;
        }

        #btn-down {
            top: 100px;
            left: 50px;
        }

        @media (pointer: coarse) {
            #mobile-controls {
                display: block;
            }

            #ui-container {
                display: none;
            }
        }

        /* BİLGİ PANELİ */
        #info-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 8, 5, 0.93);
            color: #f0ead8;
            padding: 28px 32px;
            border-radius: 18px;
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 380px;
            width: 88vw;
            z-index: 9999;
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 218, 117, 0.35);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            pointer-events: all;
        }

        #info-panel.visible {
            display: block;
            animation: fadeInPanel 0.25s ease;
        }

        @keyframes fadeInPanel {
            from {
                opacity: 0;
                transform: translate(-50%, -46%);
            }

            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        #info-panel .panel-title {
            font-size: 18px;
            font-weight: bold;
            color: #ffda75;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 218, 117, 0.25);
            padding-bottom: 10px;
        }

        #info-panel .panel-body {
            font-size: 14px;
            line-height: 1.7;
            color: #ddd8cc;
        }

        #info-panel .panel-close {
            margin-top: 18px;
            display: block;
            text-align: center;
            background: rgba(255, 218, 117, 0.15);
            border: 1px solid rgba(255, 218, 117, 0.4);
            color: #ffda75;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        #info-panel .panel-close:hover {
            background: rgba(255, 218, 117, 0.3);
        }

        /* ESERLER MENÜSÜ - sağ taraf */
        #exhibit-menu {
            position: fixed;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 1000;
        }

        #exhibit-menu .menu-label {
            color: rgba(255, 218, 117, 0.7);
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 11px;
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .exhibit-btn {
            background: rgba(15, 12, 8, 0.82);
            border: 1px solid rgba(255, 218, 117, 0.4);
            color: #ffda75;
            padding: 10px 14px;
            border-radius: 10px;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 13px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: background 0.2s, border-color 0.2s;
            text-align: left;
            white-space: nowrap;
            pointer-events: all;
            -webkit-tap-highlight-color: transparent;
            display: block;
            width: 100%;
        }

        .exhibit-btn:hover,
        .exhibit-btn:active {
            background: rgba(255, 218, 117, 0.2);
            border-color: #ffda75;
        }

        /* KOORDINAT GOSTERGESI */
        #coords-display {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(15, 15, 20, 0.85);
            color: #ffda75;
            padding: 10px 15px;
            border-radius: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            z-index: 1001;
            border: 1px solid rgba(255, 218, 117, 0.3);
            pointer-events: none;
            backdrop-filter: blur(5px);
        }

        /* MINI MAP STYLES */
        #mini-map {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 160px;
            height: 160px;
            background: rgba(15, 15, 20, 0.85);
            border: 1px solid rgba(255, 218, 117, 0.4);
            border-radius: 14px;
            backdrop-filter: blur(12px);
            z-index: 1000;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            pointer-events: none;
            transition: opacity 0.3s;
            display: flex;
            flex-direction: column;
        }

        .map-header {
            background: rgba(255, 218, 117, 0.1);
            padding: 6px 0;
            text-align: center;
            border-bottom: 1px solid rgba(255, 218, 117, 0.2);
        }

        .map-title {
            font-size: 10px;
            color: #ffda75;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-weight: bold;
        }

        .map-body {
            position: relative;
            flex: 1;
            width: 100%;
            background: radial-gradient(circle, rgba(255, 218, 117, 0.05) 0%, transparent 70%);
        }

        /* Grid lines for map */
        .map-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255, 218, 117, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 218, 117, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        #map-player {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #ffda75;
            border: 2px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            box-shadow: 0 0 10px #ffda75, 0 0 20px rgba(255, 218, 117, 0.5);
            transition: left 0.1s linear, top 0.1s linear;
        }

        /* Landmark dots on map */
        .map-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .map-dot::after {
            content: attr(data-label);
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 7px;
            color: rgba(255, 255, 255, 0.8);
            white-space: nowrap;
            font-family: Arial, sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>

    <!-- Bilgilendirme Ekranı -->
    <div id="ui-container">
        <div class="title">Smyrna Agorası</div>
        <div class="instruction"><span class="key">W</span><span class="key">A</span><span class="key">S</span><span
                class="key">D</span> ile hareket edin.</div>
        <div class="instruction">Mouse'a basılı tutarak etrafa bakın.</div>
        <div class="instruction highlight">🖱️ Tabelaların YANINA GİDİP tıklayın — bilgi paneli açılır.</div>
        <div class="instruction highlight">⬇️ ARKANIZDAKİ MERDİVENLERİ kullanarak<br>alt kata (su tünellerine)
            inebilirsiniz.</div>
    </div>

    <!-- Mini Map -->
    <div id="mini-map">
        <div class="map-header">
            <div id="map-title" class="map-title">Üst Kat</div>
        </div>
        <div class="map-body">
            <div class="map-grid"></div>
            <!-- Üst Kat Landmarkları -->
            <div id="marks-upper">
                <div class="map-dot" style="left: 66%; top: 63%;" data-label="Anıtsal Kapı"></div>
                <div class="map-dot" style="left: 61%; top: 77%;" data-label="Kabristan"></div>
                <div class="map-dot" style="left: 56%; top: 68%;" data-label="Sütunlu Yol"></div>
                <div class="map-dot" style="left: 42%; top: 53%;" data-label="Anıtsal Kapı"></div>
                <div class="map-dot" style="left: 50%; top: 58%;" data-label="Giriş"></div>
            </div>
            <!-- Alt Kat Landmarkları -->
            <div id="marks-lower" style="display:none">
                <div class="map-dot" style="left: 50%; top: 27%;" data-label="Merdiven"></div>
                <div class="map-dot" style="left: 83%; top: 96%;" data-label="Çeşme"></div>
                <div class="map-dot" style="left: 60%; top: 75%;" data-label="Yazıt"></div>
                <div class="map-dot" style="left: 35%; top: 60%;" data-label="Graffiti"></div>
            </div>
            <div id="map-player"></div>
        </div>
    </div>

    <!-- Mobil Yön Tuşları -->
    <div id="mobile-controls">
        <div id="btn-up" class="dpad-btn">▲</div>
        <div id="btn-left" class="dpad-btn">◀</div>
        <div id="btn-center" class="dpad-btn"></div>
        <div id="btn-right" class="dpad-btn">▶</div>
        <div id="btn-down" class="dpad-btn">▼</div>
    </div>

    <!-- Bilgi Paneli -->
    <div id="info-panel">
        <div class="panel-title" id="panel-title"></div>
        <div class="panel-body" id="panel-body"></div>
        <button id="bazilika-sound-toggle" onclick="toggleBazilikaSound()" style="display:none; margin-top:12px; width:100%; padding:10px; border:none; background:#2871c4; color:#fff; border-radius:8px; cursor:pointer; font-weight:bold;">🔊 Bazilika Sesini Aç</button>
        <span class="panel-close" onclick="closePanel()">✕ Kapat</span>
    </div>

    <!-- Eserler Menüsü -->
    <div id="exhibit-menu">
        <div class="menu-label">📖 Eserler</div>
        <button class="exhibit-btn" onclick="showInfo('nest')">🪺 Kuş Yuvası</button>
        <button class="exhibit-btn" onclick="showInfo('cesme')">🚰 Antik Çeşme</button>
        <button class="exhibit-btn" onclick="showInfo('gate')">🚪 Anıtsal Kapı</button>
        <button class="exhibit-btn" onclick="showInfo('kabristan')">⚰️ Kabristan</button>
        <button class="exhibit-btn" onclick="showInfo('kalinti')">🗿 Antik Kalıntılar</button>
        <button class="exhibit-btn" onclick="showInfo('kolonad')">🏟️ Batı Stoa</button>
        <button class="exhibit-btn" onclick="showInfo('tunel')">💧 Su Tünelleri</button>
        <button class="exhibit-btn" onclick="showInfo('graffiti')">✍️ Graffitiler</button>
        <button class="exhibit-btn" onclick="showInfo('bazilika')">⚖️ Bazilika</button>
    </div>

    <!-- Koordinat Göstergesi -->
    <div id="coords-display">X: 0.0, Y: 0.0, Z: 0.0</div>

    <!-- Sahne: physics eklendi -->
    <a-scene physics="debug: false" vr-mode-ui="enabled: false" loading-screen="enabled: false"
        renderer="antialias: true; colorManagement: true;">

        <!-- ASSETS: Sesler -->
        <a-assets timeout="2000">
            <audio id="wind-sound" src="https://cdn.aframe.io/basic-guide/audio/backgroundnoise.wav"
                preload="metadata"></audio>
            <audio id="water-sound" src="https://actions.google.com/sounds/v1/water/dripping_water.ogg"
                preload="metadata"></audio>
            <!-- Bazilika sesi: WhatsApp Audio 2026-03-31 at 09.48.13 (1).mpeg -->
            <audio id="bazilika-sound" src="WhatsApp Audio 2026-03-31 at 09.48.13 (1).mpeg"
                preload="auto"></audio>
        </a-assets>

        <!-- Ambiyans Sesleri -->
        <a-sound src="#wind-sound" autoplay="true" loop="true" volume="0.3" position="0 10 0"></a-sound>
        <a-entity id="tunnel-sound" sound="src: #water-sound; autoplay: true; loop: true; volume: 0.5"
            position="0 0 50"></a-entity>
        <a-sound id="bazilika-sound-entity" src="#bazilika-sound" autoplay="false" loop="true" volume="0.6" position="7 1.5 20"></a-sound>

        <!-- ÇEVRE -->
        <a-sky color="#74a5e3"></a-sky>
        <a-light type="ambient" color="#fffaf0" intensity="0.55"></a-light>
        <a-light type="directional" position="15 25 5" color="#fff" intensity="0.9" castShadow="true"
            shadow-mapSize="2048"></a-light>
        <a-entity id="bird-nest" position="18 18 55">

            <!-- === YUVA GÖVDESİ === -->
            <a-cylinder position="0 0 0" radius="0.72" height="0.18" color="#6b4c2a" segments-radial="14"></a-cylinder>
            <a-cylinder position="0 0.28 0" radius="0.72" height="0.42" color="#5a3d1e" segments-radial="14"
                open-ended="true"></a-cylinder>
            <a-cylinder position="0 0.28 0" radius="0.60" height="0.38" color="#7a5530" segments-radial="14"
                open-ended="true"></a-cylinder>

            <a-box position="0.65 0.12 0" width="0.06" height="0.06" depth="0.55" color="#4a3018"
                rotation="0 20 5"></a-box>
            <a-box position="-0.65 0.15 0" width="0.06" height="0.06" depth="0.48" color="#5c3c1f"
                rotation="0 -15 -4"></a-box>
            <a-box position="0 0.10 0.65" width="0.55" height="0.06" depth="0.06" color="#4a3018"
                rotation="5 0 0"></a-box>
            <a-box position="0 0.16 -0.65" width="0.48" height="0.06" depth="0.06" color="#5c3c1f"
                rotation="-6 0 0"></a-box>
            <a-box position="0.46 0.13 0.46" width="0.06" height="0.06" depth="0.52" color="#4a3018"
                rotation="0 45 3"></a-box>
            <a-box position="-0.46 0.17 0.46" width="0.52" height="0.06" depth="0.06" color="#5c3c1f"
                rotation="4 0 -5"></a-box>
            <a-box position="0.46 0.11 -0.46" width="0.06" height="0.06" depth="0.5" color="#4a3018"
                rotation="0 -45 0"></a-box>
            <a-box position="-0.46 0.14 -0.46" width="0.5" height="0.06" depth="0.06" color="#5c3c1f"
                rotation="0 0 3"></a-box>
            <a-box position="0.55 0.45 0.2" width="0.05" height="0.05" depth="0.62" color="#3d2810"
                rotation="10 30 8"></a-box>
            <a-box position="-0.55 0.48 0.1" width="0.05" height="0.05" depth="0.58" color="#4a3018"
                rotation="-8 -20 0"></a-box>
            <a-box position="0.2 0.46 0.55" width="0.60" height="0.05" depth="0.05" color="#3d2810"
                rotation="6 0 10"></a-box>
            <a-box position="-0.2 0.42 -0.55" width="0.58" height="0.05" depth="0.05" color="#4a3018"
                rotation="-10 0 -8"></a-box>
            <a-box position="0.38 0.50 -0.5" width="0.05" height="0.05" depth="0.55" color="#3d2810"
                rotation="12 -50 5"></a-box>
            <a-box position="-0.38 0.44 0.5" width="0.55" height="0.05" depth="0.05" color="#4a3018"
                rotation="-5 0 12"></a-box>
            <a-box position="0.82 0.38 0.1" width="0.04" height="0.04" depth="0.35" color="#2e1e0a"
                rotation="0 10 15"></a-box>
            <a-box position="-0.80 0.40 -0.1" width="0.04" height="0.04" depth="0.30" color="#2e1e0a"
                rotation="0 -5 -18"></a-box>
            <a-box position="0.1 0.42 0.82" width="0.32" height="0.04" depth="0.04" color="#2e1e0a"
                rotation="12 0 5"></a-box>
            <a-box position="-0.15 0.38 -0.80" width="0.28" height="0.04" depth="0.04" color="#2e1e0a"
                rotation="-15 0 0"></a-box>

            <a-cylinder position="0 0.1 0" radius="0.52" height="0.08" color="#8a7250"
                segments-radial="10"></a-cylinder>
            <a-box position="0.15 0.17 0.1" width="0.08" height="0.08" depth="0.24" color="#9e8a5c"
                rotation="5 20 0"></a-box>
            <a-box position="-0.2 0.17 0.15" width="0.22" height="0.08" depth="0.07" color="#9e8a5c"
                rotation="0 -15 4"></a-box>
            <a-box position="0.1 0.16 -0.18" width="0.07" height="0.07" depth="0.20" color="#b09a6e"
                rotation="-3 30 0"></a-box>
            <a-box position="-0.1 0.15 -0.1" width="0.18" height="0.07" depth="0.06" color="#9e8a5c"
                rotation="0 0 -3"></a-box>

            <!-- === YUMURTALAR === -->
            <a-sphere position="-0.18 0.24 0.08" radius="0.115" color="#d4cdb8" segments-width="10" segments-height="8"
                scale="1 1.18 1"></a-sphere>
            <a-sphere position="-0.18 0.24 0.08" radius="0.118" color="#b8b09a" segments-width="6" segments-height="5"
                scale="1 1.18 1" opacity="0.25" transparent="true"></a-sphere>
            <a-sphere position="0.05 0.26 -0.14" radius="0.12" color="#cfc8b2" segments-width="10" segments-height="8"
                scale="1 1.2 1"></a-sphere>
            <a-sphere position="0.20 0.23 0.10" radius="0.11" color="#d8d0bb" segments-width="10" segments-height="8"
                scale="1.05 1.15 1" rotation="0 0 15"></a-sphere>

            <!-- === ANNE MARTI === -->
            <a-sphere position="0 0.72 0" radius="0.30" color="#f8f8f5" segments-width="10" segments-height="8"
                scale="1 0.75 1.5"></a-sphere>
            <a-sphere position="0 0.90 0.30" radius="0.18" color="#f5f5f2" segments-width="8"
                segments-height="6"></a-sphere>
            <a-box position="0 0.87 0.50" width="0.06" height="0.05" depth="0.16" color="#e8a020"
                rotation="-5 0 0"></a-box>
            <a-box position="0 0.85 0.56" width="0.06" height="0.025" depth="0.04" color="#c05010"></a-box>
            <a-sphere position="-0.07 0.94 0.42" radius="0.03" color="#1a1008" segments-width="6"
                segments-height="5"></a-sphere>
            <a-sphere position="0.07 0.94 0.42" radius="0.03" color="#1a1008" segments-width="6"
                segments-height="5"></a-sphere>
            <a-box position="-0.38 0.68 -0.05" width="0.55" height="0.06" depth="0.40" color="#e8e8e3"
                rotation="0 10 -18"
                animation="property: rotation; to: 0 10 -12; dur: 3000; dir: alternate; loop: true; easing: easeInOutSine"></a-box>
            <a-box position="-0.32 0.65 -0.02" width="0.40" height="0.05" depth="0.32" color="#d8d8d2"
                rotation="0 8 -10"></a-box>
            <a-box position="0.38 0.68 -0.05" width="0.55" height="0.06" depth="0.40" color="#e8e8e3"
                rotation="0 -10 18"
                animation="property: rotation; to: 0 -10 12; dur: 3000; dir: alternate; loop: true; easing: easeInOutSine"></a-box>
            <a-box position="0.32 0.65 -0.02" width="0.40" height="0.05" depth="0.32" color="#d8d8d2"
                rotation="0 -8 10"></a-box>
            <a-box position="0 0.62 -0.42" width="0.22" height="0.05" depth="0.25" color="#e0e0da"
                rotation="-15 0 0"></a-box>
            <a-cylinder position="-0.08 0.50 0.05" radius="0.02" height="0.18" color="#e8a020"
                rotation="10 0 5"></a-cylinder>
            <a-cylinder position="0.08 0.50 0.05" radius="0.02" height="0.18" color="#e8a020"
                rotation="10 0 -5"></a-cylinder>

        <a-plane id="sign-tunel" class="clickable" position="0 1.5 31" width="3" height="1" color="#111"
            rotation="0 0 0" onclick="showInfo('tunel')"></a-plane>
        <a-text position="0 1.5 31.1" value="GIZLI SU TUNELLERI" align="center" color="#FFF" width="4"
            rotation="0 0 0"></a-text>

    </a-scene>

    <script>
        const infoData = {
            cesme: {
                title: '🚰 Antik Çeşme',
                body: 'Smyrna Agorası\'nın kuzey koridorunda yer alan bu çeşme Roma dönemine aittir. MS 2. yüzyılda inşa edilmiştir.\n\nAntik kaynaklar çeşmenin yüzyıllar boyunca kesintisiz aktığını belirtmektedir. Günümüzde de su akmakta, ancak içilmesi önerilmemektedir.\n\nÇeşme dönemin şehir altyapısının ne kadar gelişmiş olduğunu gözler önüne sermektedir.'
            },
            gate: {
                title: '🚪 Anıtsal Kapı (Propylon)',
                body: 'Izgara planlı Smyrna kentinin doğu-batı yönlü caddelerinden biri agoradan geçiyordu. Bu caddenin batı yandan agoraya giriş yaptığı noktada görkemli iki gözlü bir kapı yükselmekteydi.\n\nKuzey kemerin merkezinde Roma İmparatoru Marcus Aurelius\'un eşi Faustina\'nın portre kabartması yer alır. İkinci gözde ise olasılıkla Marcus Aurelius\'un portresi bulunmaktadır. Bu iki isim, MS 178 depreminde yıkılan agorayı yeniden inşa ettirdiği için Smyrnalılar vefa borçlarını bu kapıyla ödemiştir.\n\n1940\'lı yıllarda hatalı ölçülerle onarılan kemerli kapı, 2004 yılında aslına uygun olarak yeniden restore edilmiştir.'
            },
            kabristan: {
                title: '⚰️ Kabristan (Osmanlı Stelleri)',
                body: 'Agora alanı Bizans ve Osmanlı dönemlerinde mezarlık olarak kullanılmıştır. Osmanlı dönemine ait mermer mezar taşları (steller) görülmektedir.\n\nKabartma yazılar ve çiçek desenleriyle süslü stellerin büyük bölümü 18-19. yüzyıllara tarihlenmektedir.\n\nBu alan İzmir\'in antik Yunan\'dan Osmanlı\'ya kadar farklı dönemleri iç içe barındırdığını ortaya koymaktadır.'
            },
            kalinti: {
                title: '🗿 Antik Kalıntılar',
                body: 'Alana dağılmış taş bloklar ve yıkılmış sütun başlıkları MS 178 depreminin izlerini taşımaktadır.\n\nBlokların bir bölümü Hellenistik dönem yapılarına, diğerleri Roma dönemi portiko ve tapınaklarına aittir.\n\nSütun başlıklarındaki Korint üslubu agoranın ne kadar görkemli olduğunu göstermektedir. Kazılar hâlâ sürmektedir.'
            },
            kolonad: {
                title: '🏟️ Batı Stoa',
                body: 'Üç sıra sütun dizisiyle ayrılmış neflerden oluşan Batı Stoa, bazilika gibi bir bodrum kat üzerinde yükselmekteydi. Antik dönemde bodrum katı üzerinde iki katlı bir yapı olduğu anlaşılmaktadır.\n\nAvludan üç sıra basamakla çıkılan zemin kat ve ahşap tabanlı ikinci kat, Antik Çağ\'da insanların yağmur ve güneşten korunarak gezinti yaptığı alanlardı.\n\nRoma Dönemi sonlarında bodrum kat galerilerinin bazı duvarları örülerek sarnıçlar yapılmıştır. Avluya bakan birinci kat sütunları 1940\'lı yıllarda ayağa kaldırılmıştır.'
            },
            tunel: {
                title: '💧 Gizli Su Tünelleri',
                body: 'Bazilika\'nın altındaki tonozlu tüneller Roma dönemine ait karmaşık bir su ve kanalizasyon sistemidir.\n\nMS 2. yüzyılda inşa edilen yapı suyu depolamak, dağıtmak ve atık suyu uzaklaştırmak amacıyla kullanılmıştır.\n\nÜç paralel koridordan oluşan sistem büyük bir kavşakla birbirine bağlanmaktadır. Antik Smyrna\'nın ileri mühendisliğinin kanıtıdır.'
            },
            graffiti: {
                title: '✍️ Graffitiler',
                body: 'Bazilika bodrum katı duvar ve kemer ayaklarındaki sıvalar üzerine yapılmış olan bu graffitiler Roma dönemine aittir. Demir ve meşe kökü karışımı mürekkeple çizilenler ile kazıma yöntemiyle yapılanlar olmak üzere iki farklı teknik kullanılmıştır.\n\nAşk oyunlarından gladyatör mücadelelerine, cinsellikten yelkenli resimlerine, sevgili adlarından kuşlara ve gemilere kadar günlük yaşamın her rengini yansıtan bu graffitiler, dönemin sosyal hayatına dair eşsiz belgelerdir. Pergamon, Ephesos ve Smyrna arasındaki rekabet bile halk arasında kent sloganlarıyla graffitilere yansımıştır.\n\nDünya\'nın demir-meşe kökü malzemeyle yapılmış en eski graffitileri olan bu eserler, tasvir zenginliği açısından da dünya arkeoloji literatüründe eşsiz bir yere sahiptir. Hıristiyanlığın ilk dönemlerine ait önemli ipuçları da içermektedirler.'
            },
            bazilika: {
                title: '⚖️ Bazilika',
                body: 'Agoranın kuzey kanadında yer alan bazilika, dıştan dışa 165 x 28 metre ölçüleriyle bilinen en büyük Roma dönemi bazilikasıdır.\n\nOrtada geniş ve yüksek, yanlarda dar ve alçak koridorlardan oluşan plan, Hristiyan kiliselerinin öncüsüdür. Roma döneminde kentin hukuk işlerinin görüldüğü bir adliye sarayı işlevi üstlenen yapıda tüccar ve bankerler de faaliyet gösteriyordu.\n\nGünümüze ulaşan görkemli bodrum katının doğu ve batı uçlarındaki çapraz tonozlar Roma dönemi mimarlığının şaheserlerindendir. Roma dönemi sonlarında bazilikanın kuzey cephesine eklenen tonozlu dükkan sıraları, agoranın giderek ticari bir merkeze dönüştüğünü gözler önüne sermektedir.'
            },
            stela: {
                title: '📜 Onur Yazıtı (Menekles)',
                body: 'En tatlı vatanı (Smyrna), Asya Birliği Başkanı (Asiarkh) olarak onurlu ve cömert hizmetlerde bulunan Iulius Menekles Diophantos\'u onurlandırdı.\n\nBu yazıt, antik Smyrna\'nın sosyal hiyerarşisini ve kente hizmet edenlerin nasıl ödüllendirildiğini gösteren önemli bir belgedir.'
            },
            nest: {
                title: '🪺 Kuş Yuvası',
                body: 'Agora\'nın taş sütunları arasına kurulmuş bu martı yuvası, antik yapıların doğayla iç içe geçtiğinin güzel bir örneğidir.\n\nAnne martı üç yumurtasını korumaktadır. Akdeniz martıları (Larus michahellis) İzmir körfezinin vazgeçilmez sakinleridir.\n\nYuva, ince dallar ve deniz otu kullanılarak örülmüştür. Yumurtalar 28-30 gün içinde çatlar.'
            }
        };

        let isBazilikaSoundOn = false;

        function showInfo(key) {
            const data = infoData[key];
            if (!data) return;
            document.getElementById('panel-title').textContent = data.title;
            document.getElementById('panel-body').textContent = data.body;
            const soundToggle = document.getElementById('bazilika-sound-toggle');
            if (key === 'bazilika') {
                soundToggle.style.display = 'block';
                soundToggle.textContent = isBazilikaSoundOn ? '🔊 Ses: Açık (Kapat)' : '🔈 Ses: Kapalı (Aç)';
            } else {
                soundToggle.style.display = 'none';
            }
            document.getElementById('info-panel').classList.add('visible');
        }

        function closePanel() {
            document.getElementById('info-panel').classList.remove('visible');
        }

        function toggleBazilikaSound() {
            const soundEnt = document.getElementById('bazilika-sound-entity');
            const soundToggle = document.getElementById('bazilika-sound-toggle');
            if (!soundEnt || !soundEnt.components || !soundEnt.components.sound) return;
            const sound = soundEnt.components.sound;
            if (isBazilikaSoundOn) {
                sound.pauseSound();
                isBazilikaSoundOn = false;
                soundToggle.textContent = '🔈 Ses: Kapalı (Aç)';
            } else {
                sound.playSound();
                isBazilikaSoundOn = true;
                soundToggle.textContent = '🔊 Ses: Açık (Kapat)';
            }
        }

        window.addEventListener('load', () => {
            [0, 800, 2000].forEach(t => setTimeout(() => {
                const v = document.querySelector('.a-enter-vr');
                if (v) v.remove();
            }, t));
        });

        function simulateKey(key, isPressed) {
            const type = isPressed ? 'keydown' : 'keyup';
            window.dispatchEvent(new KeyboardEvent(type, { key, code: 'Key' + key.toUpperCase() }));
        }

        function setupBtn(id, key) {
            const btn = document.getElementById(id);
            if (!btn) return;
            const on = e => { e.preventDefault(); simulateKey(key, true); };
            const off = e => { e.preventDefault(); simulateKey(key, false); };
            btn.addEventListener('touchstart', on, { passive: false });
            btn.addEventListener('mousedown', on);
            btn.addEventListener('touchend', off, { passive: false });
            btn.addEventListener('mouseup', off);
            btn.addEventListener('mouseleave', off);
        }

        setupBtn('btn-up', 'w');
        setupBtn('btn-left', 'a');
        setupBtn('btn-right', 'd');
        setupBtn('btn-down', 's');

        const coordsDisplay = document.getElementById('coords-display');
        const cameraEntity = document.querySelector('a-camera');

        function updateCoords() {
            if (cameraEntity && cameraEntity.object3D) {
                const worldPos = new THREE.Vector3();
                cameraEntity.object3D.getWorldPosition(worldPos);

                // Kat tespiti (Y koordinatına göre)
                const floor = worldPos.y > 4 ? "Üst Kat" : "Alt Kat (Tüneller)";
                coordsDisplay.textContent = `Kat: ${floor} | X: ${worldPos.x.toFixed(1)}, Y: ${worldPos.y.toFixed(1)}, Z: ${worldPos.z.toFixed(1)}`;

                // Harita Güncelleme
                const playerDot = document.getElementById('map-player');
                const mapTitle = document.getElementById('map-title');
                const marksUpper = document.getElementById('marks-upper');
                const marksLower = document.getElementById('marks-lower');
                const isUpper = worldPos.y > 4;

                mapTitle.textContent = isUpper ? "Üst Kat" : "Alt Kat";
                marksUpper.style.display = isUpper ? 'block' : 'none';
                marksLower.style.display = isUpper ? 'none' : 'block';

                if (isUpper) {
                    const x = ((worldPos.x + 150) / 300) * 100;
                    const z = ((worldPos.z + 150) / 300) * 100;
                    playerDot.style.left = x + '%';
                    playerDot.style.top = z + '%';
                } else {
                    const x = ((worldPos.x + 12) / 24) * 100;
                    const z = ((worldPos.z - 8) / 80) * 100;
                    playerDot.style.left = x + '%';
                    playerDot.style.top = z + '%';
                }

                // Tünel Sesi Kontrolü
                const tunnelSound = document.getElementById('tunnel-sound');
                if (tunnelSound) {
                    const volume = worldPos.y < 4 ? 0.6 : 0.05;
                    tunnelSound.setAttribute('sound', 'volume', volume);
                }
            }
            requestAnimationFrame(updateCoords);
        }
        updateCoords();
    </script>
</body>

</html>

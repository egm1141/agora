<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Agora Müze Gezisi</title>
    <!-- A-Frame Kütüphanesi -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- A-Frame Environment Component (Hazır gökyüzü ve çevre için) -->
    <script
        src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
        }

        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 20, 0.85);
            color: #fff;
            padding: 20px 30px;
            border-radius: 16px;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            pointer-events: none;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            min-width: 300px;
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #d4af37;
            /* Altın sarısı */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .instruction {
            font-size: 15px;
            margin: 8px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .key {
            background: #fff;
            color: #000;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 13px;
            box-shadow: 0 2px 0 #ccc;
        }

        .note {
            margin-top: 15px;
            font-size: 12px;
            color: #aaa;
            font-style: italic;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 10px;
        }
    </style>
</head>

<body>
    <!-- Kullanıcı Arayüzü (Bilgilendirme) -->
    <div id="ui-container">
        <div class="title">Antik Agora</div>
        <div class="instruction">
            <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span>
            tuşları ile hareket edin
        </div>
        <div class="instruction">
            <span>🖱️</span>
            Ekrana tıklayıp fareyi sürükleyerek etrafa bakın
        </div>
        <div class="note">Kendi 3D .glb/.gltf Agora modelinizi eklemek için kaynak kodundaki açıklamalara bakın.</div>
    </div>
    <!-- 3D Sahne -->
    <a-scene loading-screen="dotsColor: #d4af37; backgroundColor: #111"
        renderer="antialias: true; colorManagement: true;">

        <!-- Çevre (Çöl benzeri antik bir atmosfer) -->
        <a-entity
            environment="preset: egypt; skyType: atmosphere; lighting: none; groundColor: #c5a059; groundColor2: #ab853e; groundTexture: walkernoise"></a-entity>

        <!-- Işıklandırma -->
        <a-light type="ambient" color="#fff4e6" intensity="0.5"></a-light>
        <a-light type="directional" position="10 15 -5" color="#fff" intensity="0.9" castShadow="true"
            shadow-mapSize="2048"></a-light>
        <!-- Kamera ve Klavye+Fare Kontrolleri -->
        <a-entity position="0 1.6 8">
            <a-camera look-controls="pointerLockEnabled: false" wasd-controls="acceleration: 20"></a-camera>
        </a-entity>
        <!-- ==== ÖRNEK AGORA YAPISI (Sütunlar ve Tapınak) ==== -->
        <a-entity id="agora-placeholder" position="0 0 -5">
            <!-- Ana Mermer Zemin -->
            <a-box position="0 0.1 0" width="24" height="0.2" depth="24" color="#f5f5f0" roughness="0.9"></a-box>
            <!-- Merdivenler -->
            <a-box position="0 0.05 0" width="25" height="0.1" depth="25" color="#e0e0e0" roughness="0.9"></a-box>
            <a-box position="0 0.00 0" width="26" height="0.1" depth="26" color="#cccccc" roughness="1"></a-box>
            <!-- Sütun Rengi ve Geometrisi Şablonu -->
            <a-mixin id="column" geometry="primitive: cylinder; radius: 0.5; height: 6"
                material="color: #faf9f6; roughness: 0.8"></a-mixin>
            <a-mixin id="base" geometry="primitive: box; width: 1.2; height: 0.4; depth: 1.2"
                material="color: #e8e8e8"></a-mixin>
            <a-mixin id="top" geometry="primitive: box; width: 1.4; height: 0.3; depth: 1.4"
                material="color: #e8e8e8"></a-mixin>
            <!-- Sol Taraf Sütunları -->
            <a-entity position="-10 3.2 -10"><a-entity mixin="column"></a-entity><a-entity mixin="base"
                    position="0 -3 0"></a-entity><a-entity mixin="top" position="0 3 0"></a-entity></a-entity>
            <a-entity position="-10 3.2 -5"><a-entity mixin="column"></a-entity><a-entity mixin="base"
                    position="0 -3 0"></a-entity><a-entity mixin="top" position="0 3 0"></a-entity></a-entity>
            <a-entity position="-10 3.2 0"><a-entity mixin="column"></a-entity><a-entity mixin="base"
                    position="0 -3 0"></a-entity><a-entity mixin="top" position="0 3 0"></a-entity></a-entity>
            <a-entity position="-10 3.2 5"><a-entity mixin="column"></a-entity><a-entity mixin="base"
                    position="0 -3 0"></a-entity><a-entity mixin="top" position="0 3 0"></a-entity></a-entity>
            <a-entity position="-10 3.2 10"><a-entity mixin="column"></a-entity><a-entity mixin="base"
                    position="0 -3 0"></a-entity><a-entity mixin="top" position="0 3 0"></a-entity></a-entity>
            <!-- Sağ Taraf Sütunları -->
            <a-entity position="10 3.2 -10"><a-entity mixin="column"></a-entity><a-entity mixin="base"
                    position="0 -3 0"></a-entity><a-entity mixin="top" position="0 3 0"></a-entity></a-entity>
            <a-entity position="10 3.2 -5"><a-entity mixin="column"></a-entity><a-entity mixin="base"
                    position="0 -3 0"></a-entity><a-entity mixin="top" position="0 3 0"></a-entity></a-entity>
            <a-entity position="10 3.2 0"><a-entity mixin="column"></a-entity><a-entity mixin="base"
                    position="0 -3 0"></a-entity><a-entity mixin="top" position="0 3 0"></a-entity></a-entity>
            <a-entity position="10 3.2 5"><a-entity mixin="column"></a-entity><a-entity mixin="base"
                    position="0 -3 0"></a-entity><a-entity mixin="top" position="0 3 0"></a-entity></a-entity>
            <a-entity position="10 3.2 10"><a-entity mixin="column"></a-entity><a-entity mixin="base"
                    position="0 -3 0"></a-entity><a-entity mixin="top" position="0 3 0"></a-entity></a-entity>
            <!-- Arka Taraf Sütunları (Girişin karşısı) -->
            <a-entity position="-5 3.2 -10"><a-entity mixin="column"></a-entity><a-entity mixin="base"
                    position="0 -3 0"></a-entity><a-entity mixin="top" position="0 3 0"></a-entity></a-entity>
            <a-entity position="0 3.2 -10"><a-entity mixin="column"></a-entity><a-entity mixin="base"
                    position="0 -3 0"></a-entity><a-entity mixin="top" position="0 3 0"></a-entity></a-entity>
            <a-entity position="5 3.2 -10"><a-entity mixin="column"></a-entity><a-entity mixin="base"
                    position="0 -3 0"></a-entity><a-entity mixin="top" position="0 3 0"></a-entity></a-entity>
            <!-- Çatı Yapısı -->
            <a-box position="0 6.5 0" width="22" height="0.6" depth="22" color="#c2b295"></a-box>
            <!-- Alınlık (Ön) -->
            <a-triangle position="0 6.8 11" vertex-a="0 2.5 0" vertex-b="-11 0 0" vertex-c="11 0 0"
                color="#a69578"></a-triangle>
            <!-- Alınlık (Arka) -->
            <a-triangle position="0 6.8 -11" vertex-a="0 2.5 0" vertex-b="-11 0 0" vertex-c="11 0 0" color="#a69578"
                rotation="0 180 0"></a-triangle>
            <!-- Merkezdeki Altın Heykel Kaidesi ve Küresi -->
            <a-box position="0 1.5 0" width="2" height="3" depth="2" color="#5a5a5a"></a-box>
            <a-sphere position="0 3.8 0" radius="1" color="#d4af37" roughness="0.2" metalness="0.8"></a-sphere>

            <!-- Bilgilendirme Levhası -->
            <a-plane position="0 1.5 1.01" width="1.5" height="1" color="#333"></a-plane>
            <a-text position="0 1.5 1.02" value="ANTIK AGORA" align="center" color="#FFF" width="4"></a-text>
        </a-entity>

        <!-- ============================================== -->
        <!-- YENİ EKLENEN BÖLÜMLER (FOTOĞRAFLARDAKİ GİBİ)   -->
        <!-- ============================================== -->

        <!-- 1) FOTOĞRAF 1: KEMERLİ GALERİ / BAZİLİKA ALTI (Sol Taraf) -->
        <a-entity id="vaulted-gallery" position="-25 0 -5">
            <!-- Galeri Zemini -->
            <a-box position="0 0.05 0" width="8" height="0.1" depth="30" color="#5c5c56" roughness="1"></a-box>
            <!-- Yan Duvarlar (Kemerlerin arası dolgusu) -->
            <a-box position="-3.5 1.5 0" width="1" height="3" depth="30" color="#7a7369" roughness="1"></a-box>
            <a-box position="3.5 1.5 0" width="1" height="3" depth="30" color="#7a7369" roughness="1"></a-box>
            <!-- Üst Çatı Bloğu (Gökyüzünü Kapatmak İçin) -->
            <a-box position="0 6.2 0" width="8" height="0.4" depth="30" color="#5a544a"></a-box>

            <!-- Kemer Rengi ve Geometrisi Şablonu -->
            <a-mixin id="arch" geometry="primitive: torus; radius: 3; tube: 0.5; arc: 180" material="color: #696258; roughness: 1"></a-mixin>
            <a-mixin id="pillar" geometry="primitive: box; width: 0.8; height: 3; depth: 1.2" material="color: #696258; roughness: 1"></a-mixin>
            <a-mixin id="brick-fill" geometry="primitive: box; width: 6; height: 3; depth: 0.5" material="color: #524f49; roughness: 1"></a-mixin>
            
            <!-- İç Aydınlatma (Tünel çok karanlık olmasın diye) -->
            <a-light type="point" color="#ffdb99" intensity="0.4" distance="15" position="0 3 10"></a-light>
            <a-light type="point" color="#ffdb99" intensity="0.4" distance="15" position="0 3 0"></a-light>
            <a-light type="point" color="#ffdb99" intensity="0.4" distance="15" position="0 3 -10"></a-light>

            <!-- Arka arkaya dizili kemerler (Tonoz etkisi) -->
            <a-entity position="0 0 14"><a-entity mixin="arch" position="0 3 0"></a-entity><a-entity mixin="pillar" position="-3 1.5 0"></a-entity><a-entity mixin="pillar" position="3 1.5 0"></a-entity></a-entity>
            <a-entity position="0 0 11.5"><a-entity mixin="arch" position="0 3 0"></a-entity><a-entity mixin="pillar" position="-3 1.5 0"></a-entity><a-entity mixin="pillar" position="3 1.5 0"></a-entity></a-entity>
            <a-entity position="0 0 9"><a-entity mixin="arch" position="0 3 0"></a-entity><a-entity mixin="pillar" position="-3 1.5 0"></a-entity><a-entity mixin="pillar" position="3 1.5 0"></a-entity></a-entity>
            <a-entity position="0 0 6.5"><a-entity mixin="arch" position="0 3 0"></a-entity><a-entity mixin="pillar" position="-3 1.5 0"></a-entity><a-entity mixin="pillar" position="3 1.5 0"></a-entity></a-entity>
            <a-entity position="0 0 4"><a-entity mixin="arch" position="0 3 0"></a-entity><a-entity mixin="pillar" position="-3 1.5 0"></a-entity><a-entity mixin="pillar" position="3 1.5 0"></a-entity></a-entity>
            <a-entity position="0 0 1.5"><a-entity mixin="arch" position="0 3 0"></a-entity><a-entity mixin="pillar" position="-3 1.5 0"></a-entity><a-entity mixin="pillar" position="3 1.5 0"></a-entity></a-entity>
            <a-entity position="0 0 -1"><a-entity mixin="arch" position="0 3 0"></a-entity><a-entity mixin="pillar" position="-3 1.5 0"></a-entity><a-entity mixin="pillar" position="3 1.5 0"></a-entity></a-entity>
            <a-entity position="0 0 -3.5"><a-entity mixin="arch" position="0 3 0"></a-entity><a-entity mixin="pillar" position="-3 1.5 0"></a-entity><a-entity mixin="pillar" position="3 1.5 0"></a-entity></a-entity>
            <a-entity position="0 0 -6"><a-entity mixin="arch" position="0 3 0"></a-entity><a-entity mixin="pillar" position="-3 1.5 0"></a-entity><a-entity mixin="pillar" position="3 1.5 0"></a-entity></a-entity>
            
            <!-- Fotoğraftaki Taş Yığını (Yıkıntı basamak) -->
            <a-box position="2 0.8 10" width="2" height="1.5" depth="3" color="#635d54" rotation="0 15 0"></a-box>
            <a-box position="2.5 0.3 8" width="1.5" height="0.6" depth="2" color="#5c574e" rotation="0 -10 0"></a-box>

            <!-- Tabelası -->
            <a-plane position="-3.4 1.5 15" width="2.5" height="1" color="#333" rotation="0 90 0"></a-plane>
            <a-text position="-3.38 1.5 15" value="KEMERLI GALERI\n(TONOZLAR)" align="center" color="#FFF" width="4" rotation="0 90 0"></a-text>
        </a-entity>

        <!-- 2) FOTOĞRAF 2: UZUN SÜTUN DİZİSİ (Sağ Taraf) -->
        <a-entity id="colonnade" position="20 0 -5">
            <!-- Yükseltilmiş Taş Kaide (Sütunların durduğu platform) -->
            <a-box position="0 0.8 0" width="4" height="1.5" depth="36" color="#85837c" roughness="0.9"></a-box>
            
            <!-- Etraftaki Yıkıntılar (Rastgele dağılmış bloklar) -->
            <a-box position="-4 0.4 8" width="1.5" height="0.8" depth="2" color="#a3a19b" rotation="5 25 10"></a-box>
            <a-box position="3 0.3 2" width="1" height="0.6" depth="1.5" color="#7a7a7a" rotation="10 45 0"></a-box>
            <a-box position="-3 0.2 -5" width="2" height="0.4" depth="1.5" color="#94928d" rotation="0 -15 0"></a-box>
            <a-box position="4 0.5 -10" width="1.5" height="1" depth="1.5" color="#8a8883" rotation="-10 60 5"></a-box>
            <a-cylinder position="-3.5 0.3 -2" radius="0.35" height="2" color="#cfc9ba" rotation="0 0 85"></a-cylinder>

            <!-- Sütun Rengi ve Geometrisi Şablonu -->
            <a-mixin id="tall-column" geometry="primitive: cylinder; radius: 0.35; height: 9" material="color: #cfc9ba; roughness: 0.9"></a-mixin>
            <a-mixin id="tall-base" geometry="primitive: box; width: 0.9; height: 0.5; depth: 0.9" material="color: #9c9990"></a-mixin>
            <a-mixin id="corinthian-cap" geometry="primitive: box; width: 0.8; height: 0.8; depth: 0.8" material="color: #b5b1a6"></a-mixin>

            <!-- Dizili Uzun Sütunlar -->
            <a-entity position="0 6 15"><a-entity mixin="tall-column"></a-entity><a-entity mixin="tall-base" position="0 -4.5 0"></a-entity><a-entity mixin="corinthian-cap" position="0 4.5 0"></a-entity></a-entity>
            <a-entity position="0 6 12"><a-entity mixin="tall-column"></a-entity><a-entity mixin="tall-base" position="0 -4.5 0"></a-entity><a-entity mixin="corinthian-cap" position="0 4.5 0"></a-entity></a-entity>
            <a-entity position="0 6 9"><a-entity mixin="tall-column"></a-entity><a-entity mixin="tall-base" position="0 -4.5 0"></a-entity><a-entity mixin="corinthian-cap" position="0 4.5 0"></a-entity></a-entity>
            <a-entity position="0 6 6"><a-entity mixin="tall-column"></a-entity><a-entity mixin="tall-base" position="0 -4.5 0"></a-entity><a-entity mixin="corinthian-cap" position="0 4.5 0"></a-entity></a-entity>
            <a-entity position="0 6 3"><a-entity mixin="tall-column"></a-entity><a-entity mixin="tall-base" position="0 -4.5 0"></a-entity><a-entity mixin="corinthian-cap" position="0 4.5 0"></a-entity></a-entity>
            <a-entity position="0 6 0"><a-entity mixin="tall-column"></a-entity><a-entity mixin="tall-base" position="0 -4.5 0"></a-entity><a-entity mixin="corinthian-cap" position="0 4.5 0"></a-entity></a-entity>
            <a-entity position="0 6 -3"><a-entity mixin="tall-column"></a-entity><a-entity mixin="tall-base" position="0 -4.5 0"></a-entity><a-entity mixin="corinthian-cap" position="0 4.5 0"></a-entity></a-entity>
            <a-entity position="0 6 -6"><a-entity mixin="tall-column"></a-entity><a-entity mixin="tall-base" position="0 -4.5 0"></a-entity><a-entity mixin="corinthian-cap" position="0 4.5 0"></a-entity></a-entity>
            <a-entity position="0 6 -9"><a-entity mixin="tall-column"></a-entity><a-entity mixin="tall-base" position="0 -4.5 0"></a-entity><a-entity mixin="corinthian-cap" position="0 4.5 0"></a-entity></a-entity>
            <a-entity position="0 6 -12"><a-entity mixin="tall-column"></a-entity><a-entity mixin="tall-base" position="0 -4.5 0"></a-entity><a-entity mixin="corinthian-cap" position="0 4.5 0"></a-entity></a-entity>
            <a-entity position="0 6 -15"><a-entity mixin="tall-column"></a-entity><a-entity mixin="tall-base" position="0 -4.5 0"></a-entity><a-entity mixin="corinthian-cap" position="0 4.5 0"></a-entity></a-entity>

            <!-- Tabelası -->
            <a-plane position="-2.5 3 15" width="2" height="1" color="#333" rotation="0 -45 0"></a-plane>
            <a-text position="-2.48 3 15.02" value="SIRA SUTUNLAR\n(COLONNADE)" align="center" color="#FFF" width="4" rotation="0 -45 0"></a-text>
        </a-entity>

        <!-- Kendi 3D modelinizi yüklemek isterseniz aşağıdaki kodları aktif edebilirsiniz. -->
        <!--
        <a-assets>
            <a-asset-item id="agora-glb" src="agora_modeli.glb"></a-asset-item>
        </a-assets>
        <a-entity gltf-model="#agora-glb" position="0 0 0" scale="1 1 1"></a-entity>
        -->
    </a-scene>
</body>

</html>

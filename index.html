<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Agora Müze Gezisi</title>
    <!-- A-Frame Kütüphanesi -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- Physics ve Extras (Çarpışma ve Gelişmiş Kontroller için) -->
    <script
        src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #87CEEB;
        }

        /* A-Frame'in VR butonunu tamamen gizle */
        .a-enter-vr,
        .a-enter-vr-button,
        [class*="a-enter-vr"] {
            display: none !important;
        }

        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 20, 0.85);
            color: #fff;
            padding: 20px 30px;
            border-radius: 16px;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            pointer-events: none;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ffda75;
            text-transform: uppercase;
        }

        .instruction {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 4px 0;
            font-size: 14px;
        }

        .key {
            background: #fff;
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
        }

        .highlight {
            color: #81d4fa;
            font-weight: bold;
            margin-top: 5px;
        }

        /* MOBİL KONTROLLER (D-PAD) */
        #mobile-controls {
            position: fixed;
            bottom: 40px;
            left: 40px;
            width: 150px;
            height: 150px;
            display: none;
            z-index: 1000;
            user-select: none;
            -webkit-user-select: none;
        }

        .dpad-btn {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(128, 128, 128, 0.5);
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            touch-action: manipulation;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.4);
        }

        .dpad-btn:active {
            background: rgba(200, 200, 200, 0.8);
            box-shadow: none;
            transform: translateY(2px);
        }

        #btn-up {
            top: 0;
            left: 50px;
        }

        #btn-left {
            top: 50px;
            left: 0;
        }

        #btn-center {
            top: 50px;
            left: 50px;
            border-radius: 4px;
            background: rgba(128, 128, 128, 0.3);
        }

        #btn-right {
            top: 50px;
            left: 100px;
        }

        #btn-down {
            top: 100px;
            left: 50px;
        }

        @media (pointer: coarse) {
            #mobile-controls {
                display: block;
            }

            #ui-container {
                display: none;
            }
        }

        /* BİLGİ PANELİ */
        #info-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 8, 5, 0.93);
            color: #f0ead8;
            padding: 28px 32px;
            border-radius: 18px;
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 380px;
            width: 88vw;
            z-index: 9999;
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 218, 117, 0.35);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            pointer-events: all;
        }

        #info-panel.visible {
            display: block;
            animation: fadeInPanel 0.25s ease;
        }

        @keyframes fadeInPanel {
            from {
                opacity: 0;
                transform: translate(-50%, -46%);
            }

            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        #info-panel .panel-title {
            font-size: 18px;
            font-weight: bold;
            color: #ffda75;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 218, 117, 0.25);
            padding-bottom: 10px;
        }

        #info-panel .panel-body {
            font-size: 14px;
            line-height: 1.7;
            color: #ddd8cc;
        }

        #info-panel .panel-close {
            margin-top: 18px;
            display: block;
            text-align: center;
            background: rgba(255, 218, 117, 0.15);
            border: 1px solid rgba(255, 218, 117, 0.4);
            color: #ffda75;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        #info-panel .panel-close:hover {
            background: rgba(255, 218, 117, 0.3);
        }

        /* ESERLER MENÜSÜ - sağ taraf */
        #exhibit-menu {
            position: fixed;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 1000;
        }

        #exhibit-menu .menu-label {
            color: rgba(255, 218, 117, 0.7);
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 11px;
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .exhibit-btn {
            background: rgba(15, 12, 8, 0.82);
            border: 1px solid rgba(255, 218, 117, 0.4);
            color: #ffda75;
            padding: 10px 14px;
            border-radius: 10px;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 13px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: background 0.2s, border-color 0.2s;
            text-align: left;
            white-space: nowrap;
            pointer-events: all;
            -webkit-tap-highlight-color: transparent;
            display: block;
            width: 100%;
        }

        .exhibit-btn:hover,
        .exhibit-btn:active {
            background: rgba(255, 218, 117, 0.2);
            border-color: #ffda75;
        }

        /* KOORDINAT GOSTERGESI */
        #coords-display {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(15, 15, 20, 0.85);
            color: #ffda75;
            padding: 10px 15px;
            border-radius: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            z-index: 1001;
            border: 1px solid rgba(255, 218, 117, 0.3);
            pointer-events: none;
            backdrop-filter: blur(5px);
        }
    </style>
</head>

<body>

    <!-- Bilgilendirme Ekranı -->
    <div id="ui-container">
        <div class="title">Smyrna Agorası</div>
        <div class="instruction"><span class="key">W</span><span class="key">A</span><span class="key">S</span><span
                class="key">D</span> ile hareket edin.</div>
        <div class="instruction">Mouse'a basılı tutarak etrafa bakın.</div>
        <div class="instruction highlight">🖱️ Tabelaların YANINA GİDİP tıklayın — bilgi paneli açılır.</div>
        <div class="instruction highlight">⬇️ ARKANIZDAKİ MERDİVENLERİ kullanarak<br>alt kata (su tünellerine)
            inebilirsiniz.</div>
    </div>

    <!-- Mobil Yön Tuşları -->
    <div id="mobile-controls">
        <div id="btn-up" class="dpad-btn">▲</div>
        <div id="btn-left" class="dpad-btn">◀</div>
        <div id="btn-center" class="dpad-btn"></div>
        <div id="btn-right" class="dpad-btn">▶</div>
        <div id="btn-down" class="dpad-btn">▼</div>
    </div>

    <!-- Bilgi Paneli -->
    <div id="info-panel">
        <div class="panel-title" id="panel-title"></div>
        <div class="panel-body" id="panel-body"></div>
        <span class="panel-close" onclick="closePanel()">✕ Kapat</span>
    </div>

    <!-- Eserler Menüsü -->
    <div id="exhibit-menu">
        <div class="menu-label">📖 Eserler</div>
        <button class="exhibit-btn" onclick="showInfo('cesme')">🚰 Antik Çeşme</button>
        <button class="exhibit-btn" onclick="showInfo('altar')">🏛️ Merkez Sunak</button>
        <button class="exhibit-btn" onclick="showInfo('kabristan')">⚰️ Kabristan</button>
        <button class="exhibit-btn" onclick="showInfo('kalinti')">🗿 Antik Kalıntılar</button>
        <button class="exhibit-btn" onclick="showInfo('kolonad')">🏟️ Sütunlu Yol</button>
        <button class="exhibit-btn" onclick="showInfo('tunel')">💧 Su Tünelleri</button>
    </div>

    <!-- Koordinat Göstergesi -->
    <div id="coords-display">X: 0.0, Y: 0.0, Z: 0.0</div>

    <!-- Sahne: physics eklendi -->
    <a-scene physics="debug: false" vr-mode-ui="enabled: false"
        loading-screen="dotsColor: #ffda75; backgroundColor: #111" renderer="antialias: true; colorManagement: true;">

        <!-- ASSETS: Sesler -->
        <a-assets>
            <audio id="wind-sound" src="https://cdn.aframe.io/basic-guide/audio/backgroundnoise.wav"
                preload="auto"></audio>
            <audio id="water-sound" src="https://actions.google.com/sounds/v1/water/dripping_water.ogg"
                preload="auto"></audio>
        </a-assets>

        <!-- Ambiyans Sesleri -->
        <a-sound src="#wind-sound" autoplay="true" loop="true" volume="0.3" position="0 10 0"></a-sound>
        <a-entity id="tunnel-sound" sound="src: #water-sound; autoplay: true; loop: true; volume: 0.5"
            position="0 0 50"></a-entity>

        <!-- ÇEVRE -->
        <a-sky color="#74a5e3"></a-sky>
        <a-light type="ambient" color="#fffaf0" intensity="0.55"></a-light>
        <a-light type="directional" position="15 25 5" color="#fff" intensity="0.9" castShadow="true"
            shadow-mapSize="2048"></a-light>
        <a-scene fog="type: linear; color: #74a5e3; near: 30; far: 180"></a-scene>

        <!-- Kamera Rig: Uçma Modu (Fly) Aktif ve Fare Kilidi (Pointer Lock) -->
        <a-entity id="camera-rig" position="0 8.4 15">
            <a-camera id="main-camera" look-controls="pointerLockEnabled: true"
                wasd-controls="acceleration: 25; fly: true">
                <a-cursor fuse="false" raycaster="objects: .clickable" color="#ffda75"></a-cursor>
            </a-camera>
        </a-entity>

        <!-- ============================================== -->
        <!-- ÜST KAT ZEMİNİ                                -->
        <!-- ============================================== -->
        <a-plane position="-80.5 6.81 0" rotation="-90 0 0" width="139" height="300" color="#687d55"
            material="roughness: 1" static-body></a-plane>
        <a-plane position="80.5 6.81 0" rotation="-90 0 0" width="139" height="300" color="#687d55"
            material="roughness: 1" static-body></a-plane>
        <a-plane position="0 6.81 -66" rotation="-90 0 0" width="22" height="168" color="#687d55"
            material="roughness: 1" static-body></a-plane>
        <a-plane position="0 6.81 119" rotation="-90 0 0" width="22" height="62" color="#687d55" material="roughness: 1"
            static-body></a-plane>
        <a-plane position="0 6.81 59" rotation="-90 0 0" width="10" height="58" color="#687d55" material="roughness: 1"
            static-body></a-plane>
        <a-plane position="-7 6.81 24" rotation="-90 0 0" width="8" height="12" color="#687d55" material="roughness: 1"
            static-body></a-plane>
        <a-plane position="7 6.81 24" rotation="-90 0 0" width="8" height="12" color="#687d55" material="roughness: 1"
            static-body></a-plane>

        <!-- ============================================== -->
        <!-- ALT KATA İNİŞ MERDİVENİ                       -->
        <!-- ============================================== -->
        <a-entity id="staircase" position="0 0 0">
            <a-box position="-3.1 7.3 25" width="0.2" height="1" depth="10" color="#4a4740"></a-box>
            <a-box position="3.1 7.3 25" width="0.2" height="1" depth="10" color="#4a4740"></a-box>
            <a-box position="0 7.3 30.1" width="6.4" height="1" depth="0.2" color="#4a4740"></a-box>

            <a-plane position="-3.25 7.3 25" width="10" height="1" color="#222" rotation="0 -90 0"></a-plane>
            <a-text position="-3.26 7.3 25" value="<- TUNELLERE INIS" align="center" color="#FFF" width="4"
                rotation="0 -90 0"></a-text>

            <a-plane position="3.25 7.3 25" width="10" height="1" color="#222" rotation="0 90 0"></a-plane>
            <a-text position="3.26 7.3 25" value="TUNELLERE INIS ->" align="center" color="#FFF" width="4"
                rotation="0 90 0"></a-text>

            <a-box position="0 6.46 20.5" width="6" height="0.68" depth="1" color="#736d62"></a-box>
            <a-box position="0 5.78 21.5" width="6" height="0.68" depth="1" color="#736d62"></a-box>
            <a-box position="0 5.10 22.5" width="6" height="0.68" depth="1" color="#736d62"></a-box>
            <a-box position="0 4.42 23.5" width="6" height="0.68" depth="1" color="#736d62"></a-box>
            <a-box position="0 3.74 24.5" width="6" height="0.68" depth="1" color="#736d62"></a-box>
            <a-box position="0 3.06 25.5" width="6" height="0.68" depth="1" color="#736d62"></a-box>
            <a-box position="0 2.38 26.5" width="6" height="0.68" depth="1" color="#736d62"></a-box>
            <a-box position="0 1.70 27.5" width="6" height="0.68" depth="1" color="#736d62"></a-box>
            <a-box position="0 1.02 28.5" width="6" height="0.68" depth="1" color="#736d62"></a-box>
            <a-box position="0 0.34 29.5" width="6" height="0.68" depth="1" color="#736d62"></a-box>
        </a-entity>

        <!-- ============================================== -->
        <!-- ÜST KAT: TARİHİ ESERLER                       -->
        <!-- ============================================== -->
        <a-entity id="upper-level" position="0 6.8 0">


                <!-- Yükseltilmiş Platform -->
                <a-box position="0 1 0" width="26" height="2" depth="21" color="#8c8779" static-body></a-box>

                <!-- Merdivenler -->
                <a-entity id="graveyard-stairs" position="0 0 -10.5">
                    <a-box position="0 0.2 -2" width="5" height="0.4" depth="1" color="#7d796e"></a-box>
                    <a-box position="0 0.6 -1" width="5" height="0.4" depth="1" color="#7d796e"></a-box>
                    <a-box position="0 1.0 0" width="5" height="0.4" depth="1" color="#7d796e"></a-box>
                    <a-box position="0 1.4 1" width="5" height="0.4" depth="1" color="#7d796e"></a-box>
                    <a-box position="0 1.8 2" width="5" height="0.4" depth="1" color="#7d796e"></a-box>
                </a-entity>

                <a-entity id="graveyard" position="0 2 0" rotation="0 180 0">
                    <a-plane position="0 0.05 0" width="25" height="20" color="#546b40" rotation="-90 0 0"></a-plane>

                    <!-- Taştan Çit (Fence) -->
                    <a-box position="0 0.4 -10" width="25" height="0.8" depth="0.2" color="#6e6a5f"></a-box>
                    <!-- Kuzey -->
                    <a-box position="0 0.4 10" width="25" height="0.8" depth="0.2" color="#6e6a5f"></a-box>
                    <!-- Güney -->
                    <a-box position="-12.5 0.4 0" width="0.2" height="0.8" depth="20" color="#6e6a5f"></a-box>
                    <!-- Batı -->
                    <a-box position="12.5 0.4 0" width="0.2" height="0.8" depth="20" color="#6e6a5f"></a-box>
                    <!-- Doğu -->

                    <a-box position="-8 0.8 -6" width="0.5" height="1.6" depth="0.15" color="#c9c3b3"
                        rotation="5 15 0"></a-box>
                    <a-box position="-6 0.7 -5" width="0.4" height="1.4" depth="0.1" color="#b5b0a1"
                        rotation="0 -10 0"></a-box>
                    <a-box position="-4 1 -6" width="0.6" height="2" depth="0.2" color="#e3e0d8"
                        rotation="-5 5 2"></a-box>
                    <a-box position="-2 0.9 -7" width="0.5" height="1.8" depth="0.15" color="#a8a396"
                        rotation="10 -20 0"></a-box>
                    <a-box position="0 0.8 -6" width="0.4" height="1.6" depth="0.1" color="#c9c3b3"
                        rotation="0 10 0"></a-box>
                    <a-box position="2 0.7 -5" width="0.5" height="1.4" depth="0.2" color="#d1cabc"
                        rotation="15 0 5"></a-box>
                    <a-box position="4 1.1 -6" width="0.6" height="2.2" depth="0.15" color="#e3e0d8"
                        rotation="-10 25 0"></a-box>
                    <a-box position="6 0.8 -5" width="0.4" height="1.6" depth="0.1" color="#a8a396"
                        rotation="0 -15 0"></a-box>

                    <a-box position="-7 0.9 -2" width="0.5" height="1.8" depth="0.15" color="#e3e0d8"
                        rotation="0 5 0"></a-box>
                    <a-box position="-5 0.6 -1" width="0.4" height="1.2" depth="0.1" color="#b5b0a1"
                        rotation="20 -10 0"></a-box>
                    <a-box position="-3 1 -2" width="0.6" height="2" depth="0.2" color="#c9c3b3"
                        rotation="-5 0 -5"></a-box>
                    <a-box position="-1 0.8 -1" width="0.5" height="1.6" depth="0.15" color="#a8a396"
                        rotation="10 30 0"></a-box>
                    <a-box position="1 0.9 -2" width="0.4" height="1.8" depth="0.1" color="#e3e0d8"
                        rotation="0 -10 0"></a-box>
                    <a-box position="3 0.7 -1" width="0.5" height="1.4" depth="0.2" color="#d1cabc"
                        rotation="5 0 0"></a-box>

                    <a-entity position="-6 0.4 4">
                        <a-box width="1.2" height="0.8" depth="2.4" color="#a8a396"></a-box>
                        <a-plane position="0 0.41 0" width="1" height="2.2" color="#425c2d"
                            rotation="-90 0 0"></a-plane>
                        <a-box position="0 0.8 -1" width="0.6" height="1.6" depth="0.15" color="#e3e0d8"></a-box>
                    </a-entity>
                    <a-entity position="-2 0.3 3" rotation="0 15 0">
                        <a-box width="1.2" height="0.6" depth="2.2" color="#c9c3b3"></a-box>
                        <a-plane position="0 0.31 0" width="1" height="2" color="#425c2d" rotation="-90 0 0"></a-plane>
                        <a-box position="0 0.6 -0.9" width="0.5" height="1.2" depth="0.1" color="#a8a396"
                            rotation="-10 0 0"></a-box>
                    </a-entity>
                    <a-entity position="3 0.4 5" rotation="0 -10 0">
                        <a-box width="1.4" height="0.5" depth="2.2" color="#b5b0a1"></a-box>
                        <a-box position="0.8 0 0" width="0.5" height="0.3" depth="1" color="#b5b0a1"
                            rotation="0 20 20"></a-box>
                        <a-box position="0 0.6 -0.8" width="0.5" height="1.2" depth="0.1" color="#e3e0d8"></a-box>
                    </a-entity>

                    <a-plane id="sign-kabristan" class="clickable" position="-2 1.5 10" width="3" height="1"
                        color="#333"></a-plane>
                    <a-text position="-2 1.5 10.01" value="KABRISTAN\n(Osmanli Stelleri)" align="center" color="#FFF"
                        width="4"></a-text>
                    <!-- Arkası -->
                    <a-plane position="-2 1.5 9.99" width="3" height="1" color="#333" rotation="0 180 0"></a-plane>
                    <a-text position="-2 1.5 9.98" value="KABRISTAN\n(Osmanli Stelleri)" align="center" color="#FFF"
                        width="4" rotation="0 180 0"></a-text>
                </a-entity>
            </a-entity>

            <!-- ANTİK BLOKLAR (Scattered Ruins) -->
            <a-entity id="ruins-field" position="42 0 36">
                <a-box position="0 0.3 0" width="3" height="0.6" depth="0.8" color="#d1cabc" rotation="0 15 0"></a-box>
                <a-box position="4 0.4 -2" width="4" height="0.8" depth="1" color="#e3e0d8" rotation="0 -25 0"></a-box>
                <a-box position="2 0.2 3" width="2" height="0.4" depth="1.5" color="#b5b0a1" rotation="0 45 0"></a-box>
                <a-box position="-3 0.35 1" width="2.5" height="0.7" depth="0.9" color="#c9c3b3"
                    rotation="0 5 0"></a-box>
                <a-box position="-1 0.25 -4" width="3.5" height="0.5" depth="1.2" color="#e3e0d8"
                    rotation="0 -10 0"></a-box>
                <a-cylinder position="-5 0.4 -1" radius="0.4" height="3" color="#e3e0d8"
                    rotation="0 20 90"></a-cylinder>
                <a-cylinder position="5 0.3 2" radius="0.3" height="2" color="#c9c3b3" rotation="0 -15 90"></a-cylinder>
                <a-box position="-6 0.3 4" width="2" height="0.6" depth="0.8" color="#d1cabc" rotation="0 35 0"></a-box>

                <a-plane id="sign-kalinti" class="clickable" position="0 1.5 6" width="3" height="1" color="#333"
                    rotation="0 15 0"></a-plane>
                <a-text position="0 1.5 6.01" value="ANTIK KALINTILAR\n(Yikilmis Sutun Basi, Bloklar)" align="center"
                    color="#FFF" width="3.5" rotation="0 15 0"></a-text>
                <!-- Arkası -->
                <a-plane position="0 1.5 5.99" width="3" height="1" color="#333" rotation="0 195 0"></a-plane>
                <a-text position="0 1.5 5.98" value="ANTIK KALINTILAR\n(Yikilmis Sutun Basi, Bloklar)" align="center"
                    color="#FFF" width="3.5" rotation="0 195 0"></a-text>
            </a-entity>

            <!-- KEMERLİ KAPI (ANITSAL KAPI) -->
            <a-entity id="monumental-gate" position="50 0 45" rotation="0 45 0">
                <a-box position="-4 3 0" width="2" height="6" depth="2" color="#9a9587"></a-box>

            kabristan: {
                title: '⚰️ Kabristan (Osmanlı Stelleri)',

            },
            kalinti: {
                title: '🗿 Antik Kalıntılar',
                body: 'Alana dağılmış taş bloklar ve yıkılmış sütun başlıkları MS 178 depreminin izlerini taşımaktadır.\n\nBlokların bir bölümü Hellenistik dönem yapılarına, diğerleri Roma dönemi portiko ve tapınaklarına aittir.\n\nSütun başlıklarındaki Korint üslubu agoranın ne kadar görkemli olduğunu göstermektedir. Kazılar hâlâ sürmektedir.'

                title: '🏟️ Sütunlu Yol (Colonnade)',
                body: 'Batı Stoa\'nın parçası olan bu sütunlu yol MS 2. yüzyılda inşa edilmiştir. Günümüze ulaşan en büyük Roma agorası portikoları arasındadır.\n\nSütunların bir kısmı 1940\'lı yıllardaki kazılarda ayağa kaldırılmıştır. Her sütun yaklaşık 8-9 metre yüksekliğindedir.\n\nPortiko; dükkanlar, büro odaları ve toplantı alanlarıyla kent yaşamının merkeziydi.'

                title: '💧 Gizli Su Tünelleri',
                body: 'Bazilika\'nın altındaki tonozlu tüneller Roma dönemine ait karmaşık bir su ve kanalizasyon sistemidir.\n\nMS 2. yüzyılda inşa edilen yapı suyu depolamak, dağıtmak ve atık suyu uzaklaştırmak amacıyla kullanılmıştır.\n\nÜç paralel koridordan oluşan sistem büyük bir kavşakla birbirine bağlanmaktadır. Antik Smyrna\'nın ileri mühendisliğinin kanıtıdır.'

                title: '📜 Onur Yazıtı (Menekles)',

        function closePanel() {
            document.getElementById('info-panel').classList.remove('visible');
        }

        window.addEventListener('load', () => {
            [0, 800, 2000].forEach(t => setTimeout(() => {
                const v = document.querySelector('.a-enter-vr');
                if (v) v.remove();
            }, t));
        });

        function simulateKey(key, isPressed) {
            const type = isPressed ? 'keydown' : 'keyup';
            window.dispatchEvent(new KeyboardEvent(type, { key, code: 'Key' + key.toUpperCase() }));
        }

        function setupBtn(id, key) {
            const btn = document.getElementById(id);
            if (!btn) return;
            const on = e => { e.preventDefault(); simulateKey(key, true); };
            const off = e => { e.preventDefault(); simulateKey(key, false); };
            btn.addEventListener('touchstart', on, { passive: false });
            btn.addEventListener('mousedown', on);
            btn.addEventListener('touchend', off, { passive: false });
            btn.addEventListener('mouseup', off);
            btn.addEventListener('mouseleave', off);
        }

        setupBtn('btn-up', 'w');
        setupBtn('btn-left', 'a');
        setupBtn('btn-right', 'd');
        setupBtn('btn-down', 's');

        const coordsDisplay = document.getElementById('coords-display');
        const cameraEntity = document.querySelector('a-camera');

        function updateCoords() {
            if (cameraEntity && cameraEntity.object3D) {
                const worldPos = new THREE.Vector3();
                cameraEntity.object3D.getWorldPosition(worldPos);

                // Kat tespiti (Y koordinatına göre)
                const floor = worldPos.y > 4 ? "Üst Kat" : "Alt Kat (Tüneller)";
                coordsDisplay.textContent = Kat: ${floor} | X: ${worldPos.x.toFixed(1)}, Y: ${worldPos.y.toFixed(1)}, Z: ${worldPos.z.toFixed(1)};

                // Tünel Sesi Kontrolü
                const tunnelSound = document.getElementById('tunnel-sound');
                if (tunnelSound) {
                    const volume = worldPos.y < 4 ? 0.6 : 0.05;
                    tunnelSound.setAttribute('sound', 'volume', volume);
                }
            }
            requestAnimationFrame(updateCoords);
        }
        updateCoords();
    </script>
</body>

</html>
